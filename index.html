<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇷 Turkey 2026 — Чекліст</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #242736;
    --border: #2e3147;
    --accent: #4f8ef7;
    --green: #22c55e;
    --text: #e2e8f0;
    --muted: #8892a4;
    --danger: #f87171;
    --info-bg: #1e3a5f;
    --info-border: #3b82f6;
    --radius: 10px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a2a4a 0%, #0f1a35 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    display: flex; align-items: center; gap: 16px;
  }
  header .flag { font-size: 36px; }
  header .header-text { flex: 1; }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background 0.4s;
    position: relative;
  }
  .sync-dot.online { background: var(--green); }
  .sync-dot.saving { background: #facc15; }
  .sync-dot.online::after {
    content: ''; position: absolute; inset: -3px; border-radius: 50%;
    border: 1.5px solid var(--green); opacity: 0.5;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.6);opacity:0} }

  .progress-wrap { padding: 14px 24px 0; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 6px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); border-radius: 99px; transition: width 0.4s ease; }

  .tabs-wrap { padding: 16px 24px 0; overflow-x: auto; }
  .tabs { display: flex; gap: 6px; min-width: max-content; }
  .tab {
    padding: 7px 14px; border-radius: 99px; border: 1px solid var(--border);
    font-size: 13px; cursor: pointer; background: var(--bg2); color: var(--muted);
    transition: all 0.15s; white-space: nowrap; font-family: var(--font);
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .tab:hover:not(.active) { background: var(--bg3); color: var(--text); }

  .content { padding: 20px 24px 80px; max-width: 760px; }
  .section { display: none; }
  .section.active { display: block; }

  .cat-header {
    font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em; padding: 16px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }

  .item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius);
    cursor: pointer; transition: background 0.1s;
  }
  .item:hover { background: var(--bg2); }
  .checkbox {
    width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: var(--bg2); position: relative;
  }
  .item.done .checkbox { background: var(--green); border-color: var(--green); }
  .checkbox::after {
    content: ''; display: none; width: 5px; height: 9px;
    border: 2px solid #fff; border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .item.done .checkbox::after { display: block; }
  .item label { font-size: 14px; color: var(--text); cursor: pointer; line-height: 1.45; flex: 1; }
  .item.done label { text-decoration: line-through; color: var(--muted); }
  .del-btn {
    opacity: 0; font-size: 18px; color: var(--muted); cursor: pointer;
    padding: 0 4px; border: none; background: none; line-height: 1;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--danger); }

  .add-row { display: flex; gap: 8px; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
  .add-row select, .add-row input {
    font-size: 13px; padding: 8px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--bg2); color: var(--text);
    font-family: var(--font);
  }
  .add-row select { flex-shrink: 0; }
  .add-row input { flex: 1; }
  .add-row input::placeholder { color: var(--muted); }
  .add-row input:focus, .add-row select:focus { outline: none; border-color: var(--accent); }
  .add-row button {
    padding: 8px 16px; font-size: 13px; border-radius: var(--radius); border: 1px solid var(--accent);
    cursor: pointer; background: var(--accent); color: #fff; font-weight: 600;
    white-space: nowrap; font-family: var(--font); transition: opacity 0.15s;
  }
  .add-row button:hover { opacity: 0.85; }

  .tip {
    background: var(--info-bg); border-left: 3px solid var(--info-border);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 12px 16px; font-size: 14px; color: var(--text);
    margin: 8px 0; line-height: 1.6;
  }

  .loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 200px; gap: 12px; color: var(--muted); font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 500px) {
    header { padding: 14px 16px 12px; }
    .progress-wrap { padding: 12px 16px 0; }
    .tabs-wrap { padding: 12px 16px 0; }
    .content { padding: 16px 16px 80px; }
    .add-row { flex-wrap: wrap; }
    .add-row select { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="flag">🇹🇷</div>
  <div class="header-text">
    <h1>Turkey 2026 — Чекліст</h1>
    <p>Богдан · Соломія · Ромчик</p>
  </div>
  <div class="sync-dot" id="sync-dot" title="Статус з'єднання"></div>
</header>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-label">Зібрано: 0 / 0</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" data-section="docs">📋 Документи</button>
    <button class="tab" data-section="clothes">👕 Одяг</button>
    <button class="tab" data-section="cosmetics">🧴 Косметика</button>
    <button class="tab" data-section="medicine">💊 Аптека</button>
    <button class="tab" data-section="baby">👶 Ромчик</button>
    <button class="tab" data-section="beach">🏖 Пляж</button>
    <button class="tab" data-section="gadgets">📱 Техніка</button>
    <button class="tab" data-section="tips">💡 Поради</button>
  </div>
</div>

<div class="content">
  <div id="docs"      class="section active"><div class="loading"><div class="spinner"></div>Підключення...</div></div>
  <div id="clothes"   class="section"></div>
  <div id="cosmetics" class="section"></div>
  <div id="medicine"  class="section"></div>
  <div id="baby"      class="section"></div>
  <div id="beach"     class="section"></div>
  <div id="gadgets"   class="section"></div>
  <div id="tips"      class="section"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({

const db       = firebase.database();
const stateRef = db.ref('checklist');
const connRef  = db.ref('.info/connected');
const syncDot  = document.getElementById('sync-dot');

// ─── Default data ───────────────────────────────────────────────
const DEFAULT_DATA = {
  docs: {

    ],

      "Крем (для обличчя, для тіла)", "Антиперспірант", "Духи",

    ]
  },

    "Основна аптека": [
      "Жаропонижуюче для дитини (Нурофен суспензія або Панадол)",

    "Харчування та гігієна": [

      "Легкий сонцезахисний костюм для пляжу",

      "Дитячий шампунь та гель", "Дитячий антисептичний гель для рук"
    ],
    "На виїзд / різне": [
      "Коляска (легка, складна)", "Рюкзак-переноска",

    ]
  },
  beach: {
    "Пляж та басейн": [
      "Пляжний рушник (наш комплект)", "Надувний круг",
      "Нарукавники надувні для Ромчика", "Водонепроникна сумка для телефону",
      "Пляжна сумка", "Пляжний килимок"
    ]
  },
  gadgets: {
    "Техніка": [
      "Зарядні кабелі (телефони, годинник, навушники)",
      "Відео-няня", "Селфі палка", "Павербанк", "Навушники"
    ]
  }
};

const TIPS = [
  "🛫 Прибудьте в аеропорт мінімум за 2,5 години з дитиною — черги на реєстрацію та security займають більше часу.",
  "🌡 Туреччина в червні — 35–40°C. Уникайте пляжу між 12:00 та 16:00 — небезпечно для Ромчика.",
  "🧃 Пийте лише воду з пляшок або готельну. Дитині — особливо важливо.",
  "🍨 All-inclusive: одразу уточніть на reception дитяче меню, ліжечко, дитячий клуб та аніматорів.",
  "🏥 Якщо у дитини температура за кордоном — не панікуйте. Готельний лікар є або легко викликається.",
  "📱 Збережіть офлайн-карту Google Maps для свого регіону (Анталія).",
  "🧴 Крем SPF 50+ наносіть дитині за 20 хв до виходу, повторюйте кожні 1,5–2 год.",
  "🤲 Мийте руки, не їжте на пляжі продукти зі стихійних лотків.",
  "✈️ На борту: підгузники, снеки, пляшечка та іграшки — у ручний багаж.",
  "🇹🇷 Перевірте умови роумінгу або купіть турецьку SIM в аеропорту Анталії."
];

const SECTIONS = ['docs','clothes','cosmetics','medicine','baby','beach','gadgets'];

// ─── State ──────────────────────────────────────────────────────
let appState = null;

function buildDefaultState() {
  const state = { data: {}, checked: {} };
  for (const sec of SECTIONS) {
    state.data[sec] = {};
    state.checked[sec] = {};
    for (const [cat, items] of Object.entries(DEFAULT_DATA[sec])) {
      state.data[sec][cat] = [...items];
      state.checked[sec][cat] = items.map(() => false);
    }
  }
  return state;
}

// Firebase stores sparse arrays as objects — convert back
function toArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  return Object.keys(val).sort((a, b) => +a - +b).map(k => val[k]);
}

function normalizeFromFirebase(raw) {
  const state = { data: {}, checked: {} };
  for (const sec of SECTIONS) {
    state.data[sec]    = {};
    state.checked[sec] = {};
    const d = raw.data?.[sec]    || {};
    const c = raw.checked?.[sec] || {};
    for (const cat of Object.keys(d)) {
      state.data[sec][cat]    = toArray(d[cat]).map(String);
      state.checked[sec][cat] = toArray(c[cat] || []).map(Boolean);
    }
  }
  return state;
}

// ─── Firebase sync ──────────────────────────────────────────────
connRef.on('value', snap => {
  syncDot.className = 'sync-dot' + (snap.val() ? ' online' : '');
});

const loadTimeout = setTimeout(() => {
  if (!appState) showError('Timeout: Firebase не відповідає. Перевірте інтернет або правила бази даних.');
}, 12000);

stateRef.on('value', snap => {
  clearTimeout(loadTimeout);
  const raw = snap.val();
  if (!raw) {
    appState = buildDefaultState();
    stateRef.set(appState);
  } else {
    appState = normalizeFromFirebase(raw);
  }
  renderAll();
}, err => {
  clearTimeout(loadTimeout);
  showError('Firebase помилка: ' + err.code + ' — ' + err.message);
});

function showError(msg) {
  document.getElementById('docs').innerHTML =
    `<div class="tip" style="border-color:var(--danger);background:#2a1010;margin-top:12px">
      ⚠️ ${msg}
      <br><br>
      <button onclick="location.reload()" style="margin-top:8px;padding:6px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:13px">Оновити сторінку</button>
    </div>`;
}

function saveState() {
  syncDot.className = 'sync-dot saving';
  stateRef.set(appState).then(() => {
    syncDot.className = 'sync-dot online';
  }).catch(err => showError('Помилка збереження: ' + err.message));
}

// ─── Render ─────────────────────────────────────────────────────
function render(secId) {
  const el   = document.getElementById(secId);
  const cats = appState.data[secId];
  if (!cats) return;

  let html = '';
  for (const cat of Object.keys(cats)) {
    const items   = cats[cat];
    const checked = appState.checked[secId][cat] || [];
    html += `<div class="cat-header">${esc(cat)}</div>`;
    items.forEach((text, i) => {
      const uid  = `${secId}|||${encodeURIComponent(cat)}|||${i}`;
      const done = checked[i] ? ' done' : '';
      html += `<div class="item${done}" onclick="toggle('${uid}')">
        <div class="checkbox"></div>
        <label>${esc(text)}</label>
        <button class="del-btn" onclick="event.stopPropagation();del('${uid}')" title="Видалити">×</button>
      </div>`;
    });
  }

  const opts = Object.keys(cats).map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  html += `<div class="add-row">
    <select id="sel-${secId}">${opts}</select>
    <input id="inp-${secId}" type="text" placeholder="Додати пункт..."
           onkeydown="if(event.key==='Enter')addItem('${secId}')">
    <button onclick="addItem('${secId}')">+ Додати</button>
  </div>`;

  el.innerHTML = html;
}

function renderTips() {
  document.getElementById('tips').innerHTML =
    TIPS.map(t => `<div class="tip">${t}</div>`).join('');
}

function renderAll() {
  SECTIONS.forEach(render);
  renderTips();
  updateProgress();
}

// ─── Actions (exposed to window for onclick strings) ─────────────
window.toggle = function(uid) {
  const [sec, catEnc, idx] = uid.split('|||');
  const cat = decodeURIComponent(catEnc);
  const i   = +idx;
  appState.checked[sec][cat][i] = !appState.checked[sec][cat][i];
  render(sec);
  updateProgress();
  saveState();
};

window.del = function(uid) {
  const [sec, catEnc, idx] = uid.split('|||');
  const cat = decodeURIComponent(catEnc);
  const i   = +idx;
  appState.data[sec][cat].splice(i, 1);
  appState.checked[sec][cat].splice(i, 1);
  render(sec);
  updateProgress();
  saveState();
};

window.addItem = function(secId) {
  const inp  = document.getElementById('inp-' + secId);
  const sel  = document.getElementById('sel-' + secId);
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }
  const cat = sel.value;
  appState.data[secId][cat].push(text);
  appState.checked[secId][cat].push(false);
  inp.value = '';
  render(secId);
  updateProgress();
  saveState();
  inp.focus();
};

// ─── Tabs ───────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(btn.dataset.section).classList.add('active');
    btn.classList.add('active');
  });
});

// ─── Progress ───────────────────────────────────────────────────
function updateProgress() {
  let total = 0, done = 0;
  for (const sec of SECTIONS) {
    for (const cat of Object.keys(appState.data[sec] || {})) {
      total += appState.data[sec][cat].length;
      done  += (appState.checked[sec]?.[cat] || []).filter(Boolean).length;
    }
  }
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-label').textContent = `Зібрано: ${done} / ${total}`;
  document.getElementById('prog-pct').textContent   = `${pct}%`;
  document.getElementById('prog-fill').style.width  = pct + '%';
}

// ─── Reset — Shift+click header ─────────────────────────────────
document.querySelector('header').addEventListener('click', e => {
  if (!e.shiftKey) return;
  if (!confirm('Скинути всі позначки? (список збережеться)')) return;
  for (const sec of SECTIONS)
    for (const cat of Object.keys(appState.checked[sec] || {}))
      appState.checked[sec][cat] = appState.checked[sec][cat].map(() => false);
  renderAll();
  saveState();
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
